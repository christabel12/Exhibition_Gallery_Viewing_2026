<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Viewing</title>
    <link rel="stylesheet" type="text/css" href="wesbite design.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>

<body>
    <!-- Carousel 1-->
    <div id="demo" class="carousel slide" data-bs-ride="carousel">

        <!-- Indicators/dots -->
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#demo" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#demo" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#demo" data-bs-slide-to="2"></button>
        </div>

        <!-- The slideshow/carousel -->
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="Images & Videos/Photo 1.jpg" alt="Entrance 1" class="d-block w-100">
            </div>
            <div class="carousel-item">
                <img src="Images & Videos/Photo 2.jpg" alt="Entrance 2" class="d-block w-100">
            </div>
            <div class="carousel-item">
                <img src="Images & Videos/Photo 3.jpg" alt="Entrance 3" class="d-block w-100">
            </div>
            <div class="carousel-item">
                <img src="Images & Videos/Photo 4.jpg" alt="Entrance 4" class="d-block w-100">
            </div>
            <div class="carousel-item">
                <img src="Images & Videos/Photo 5.jpg" alt="Middle Section 1" class="d-block w-100">
            </div>
            <div class="carousel-item">
                <img src="Images & Videos/Photo 6.jpg" alt="Middle Section 2" class="d-block w-100">
            </div>
            <div class="carousel-item">
                <img src="Images & Videos/Photo 7.jpg" alt="Inner Section 1" class="d-block w-100">
            </div>
            <div class="carousel-item">
                <img src="Images & Videos/Photo 8.jpg" alt="Inner Section 2" class="d-block w-100">
            </div>
            <div class="carousel-item">
                <img src="Images & Videos/Photo 9.jpg" alt="Inner Section 3" class="d-block w-100">
            </div>
            <div class="carousel-item">
                <img src="Images & Videos/Photo 10.jpg" alt="Inner Section 4" class="d-block w-100">
            </div>
        </div>

        <!-- Left and right controls/icons -->
        <button class="carousel-control-prev" type="button" data-bs-target="#demo" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#demo" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>
</body>

</html>
<!DOCTYPE html>
<html lang="en">
